models:
    - name: silver_airports
      description: "This table contains the silver layer of the airports data, which includes cleaned and transformed data from the raw layer. It is designed to be used for analysis and reporting purposes."
      columns:
        - name: airport_ident
          description: "The unique identifier for each airport, typically an IATA or ICAO code."
          data_tests:
            - not_null
            - unique
        - name: airport_name
          description: "The official name of the airport."
          data_tests:
            - not_null
        - name: airport_type
          description: "The type of the airport "
          data_tests:
            - not_null
        - name: airport_lat
          description: "The latitude coordinate of the airport."
          data_tests:
            - not_null
            - dbt_expectations.expect_column_values_to_be_between:
                arguments:
                    min_value: -90 
                    max_value: 90
        - name: airport_long
          description: '{{ doc("airport_long_description") }}'
          data_tests:
            - not_null
            - dbt_expectations.expect_column_values_to_be_between:
                arguments:
                    min_value: -180 
                    max_value: 180
        - name: continent
          description: "The continent where the airport is located."
          data_tests:
            - not_null
        - name: iso_country
          description: "The ISO country code where the airport is located."
          data_tests:
            - not_null
        - name: iso_region
          description: "The ISO region code where the airport is located."
          data_tests:
            - not_null 




    - name: silver_runways
      description: "This table contains the silver layer of the runways data, which includes cleaned and transformed data from the raw layer. It is designed to be used for analysis and reporting purposes."
      columns:
        - name: runway_id
          description: "The unique identifier for each runway."
          data_tests:
            - not_null
            - unique
            - dbt_expectations.expect_column_values_to_match_regex:
                arguments:
                    regex: '^[0-9]{6}$'
        - name: airport_ident
          description: "The unique identifier for the airport associated with the runway."
          data_tests:
            - not_null
            - relationships:
                arguments:
                    to: ref('silver_airports')
                    field: airport_ident
                    severity: warn
        - name: runway_surface
          description: "The type of surface of the runway."
          data_tests:
            - not_null
        - name: runway_lighted
          description: "A boolean indicating whether the runway is lighted (0) or not (1)."
          data_tests:
            - not_null
            - accepted_values:
                values: [0, 1]
        - name: runway_closed
          description: "A boolean indicating whether the runway is closed (0) or open (1)."
          data_tests:
            - not_null
            - accepted_values:
                values: [0, 1]


    - name: silver_airport_comments
      description: "This table contains the silver layer of the airport comments data, which includes cleaned and transformed data from the raw layer. It is designed to be used for analysis and reporting purposes."
      columns:
        - name: comment_id
          description: "The unique identifier for each comment."
          data_tests:
            - not_null
            #- unique
        - name: airport_ident
          description: "The unique identifier for the airport associated with the comment."
          data_tests:
            - not_null
            - relationships:
                arguments:
                    to: ref('silver_airports')
                    field: airport_ident
                    severity: warn
        - name: comment_timestamp
          description: "The timestamp when the comment was made."
          data_tests:
            - not_null
        - name: member_nickname
          description: "The nickname of the member who made the comment."
          data_tests:
            - not_null
        - name: comment_body
          description: "The text of the comment about the airport."
          data_tests:
            - not_null
        - name: loaded_at
          description: "The timestamp when the comment was loaded into the silver layer."
          data_tests:
            - not_null
            - dbt_expectations.expect_row_values_to_have_recent_data:
                arguments:
                    datepart: day
                    interval: 1